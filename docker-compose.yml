services:

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres          # maintenance DB; report DBs are created by the app
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      network: host
    restart: unless-stopped
    # --workers 1 is mandatory: db_schema.py uses a global ENGINE variable
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-8}
      DATA_DIR: /backend/data
    volumes:
      - ./data:/backend/data                      # holiday ICS cache
      - ./app/TexTemplate:/backend/TexTemplate    # LaTeX templates
      - ./zeugnisse:/home/appuser/Zeugnisse         # PDF output

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "${APP_PORT:-1337}:3000"

volumes:
  pgdata:

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1450"
