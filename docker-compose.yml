services:

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres          # maintenance DB; report DBs are created by the app
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT}:8501"
    environment:
      # Base URL — no database name; the app appends the selected report DB
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./student_data:/app/student_data   # CSV imports survive rebuilds
      - ./data:/app/data                   # holiday ICS cache
      - ./TexTemplate:/app/TexTemplate     # LaTeX templates
      - print_output:/app/print_output     # generated PDFs

volumes:
  pgdata:
  print_output:
