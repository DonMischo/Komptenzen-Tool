services:

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres          # maintenance DB; report DBs are created by the app
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      network: host
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT}:8501"
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./student_data:/app/student_data      # CSV imports survive rebuilds
      - ./data:/app/data                      # holiday ICS cache
      - ./app/TexTemplate:/app/TexTemplate    # LaTeX templates
      - ./Zeugnisse:/home/appuser/Zeugnisse   # PDF output, host-accessible

  app-public:
    build:
      context: .
      network: host
    restart: unless-stopped
    ports:
      - "${APP_PUBLIC_PORT:-8502}:8502"
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: >
      streamlit run KompetenzenToolPublic.py
      --server.address=0.0.0.0
      --server.port=8502

volumes:
  pgdata:
  print_output:

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1450"
